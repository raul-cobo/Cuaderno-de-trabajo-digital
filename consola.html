<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONSOLA PRO - Facilitador PsycoIntera</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: white; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h1 { text-align: center; color: #3b82f6; margin-bottom: 5px;}
        h3 { text-align: center; color: #94a3b8; margin-top: 0; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.05em;}
        .btn-refresh { display: block; width: 250px; margin: 20px auto 40px auto; padding: 12px; background: #10b981; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3); }
        .btn-refresh:hover { background: #059669; }
        .btn-refresh:active { transform: scale(0.98); }
        
        #login-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .pin-box { background: white; padding: 40px; border-radius: 16px; text-align: center; color: #1f2937; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .pin-box h2 { margin-top: 0; color: #3b82f6; }
        input { font-size: 2.5rem; width: 180px; text-align: center; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; padding: 10px; border: 2px solid #cbd5e1; border-radius: 8px; letter-spacing: 0.2em; outline: none;}
        input:focus { border-color: #3b82f6; }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="pin-box">
            <h2>Consola Facilitador</h2>
            <p style="color: #6b7280; margin-bottom: 20px; font-size: 0.9rem;">Acceso restringido. Introduce el PIN Maestro.</p>
            <input type="password" id="master-pin" placeholder="••••">
            <button class="btn-refresh" style="margin-bottom: 0; width: 100%;" onclick="login()">Desbloquear Panel</button>
        </div>
    </div>

    <h1>📊 PANEL DE CONTROL EN TIEMPO REAL</h1>
    <button class="btn-refresh" onclick="fetchData()">🔄 ACTUALIZAR GRÁFICAS</button>

    <div class="grid">
        <div class="card">
            <h3>D1: La Selva (Vía Rápida vs Lenta)</h3>
            <canvas id="chartD1"></canvas>
        </div>
        <div class="card">
            <h3>D2: Top Disparadores (Ranking)</h3>
            <canvas id="chartD2"></canvas>
        </div>
        <div class="card" style="grid-column: span 2;">
            <h3>IRE: Mapa de Sensaciones Físicas</h3>
            <canvas id="chartIRE" style="max-height: 250px;"></canvas>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbzBnz289ldXCZQLYvqqJ5k2EcIjUERpTQyBccycsO7dVxNVI1XNbU9pXRwdbrWH8U4b/exec';
        const MASTER_PIN = '5629';
        
        // Variables para las gráficas
        let chart1, chart2, chart3;

        // Configuración global de Chart.js para Modo Oscuro
        Chart.defaults.color = '#94a3b8'; // Color del texto de leyendas y ejes
        Chart.defaults.borderColor = '#334155'; // Color de las líneas de la cuadrícula

        function login() {
            if (document.getElementById('master-pin').value === MASTER_PIN) {
                document.getElementById('login-gate').style.display = 'none';
                fetchData();
            } else { 
                alert('PIN Incorrecto. Acceso denegado.'); 
                document.getElementById('master-pin').value = '';
            }
        }

        // Permite usar "Enter" en el teclado para acceder
        document.getElementById('master-pin').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });

        async function fetchData() {
            const btn = document.querySelector('h1 + .btn-refresh');
            const originalText = btn.innerText;
            btn.innerText = '⏳ DESCARGANDO DATOS...';
            
            try {
                const response = await fetch(GOOGLE_URL);
                const data = await response.json();
                processData(data);
                btn.innerText = originalText;
            } catch (e) { 
                console.error("Error leyendo datos:", e); 
                btn.innerText = '❌ ERROR DE CONEXIÓN';
                setTimeout(() => btn.innerText = originalText, 3000);
            }
        }

        function processData(rows) {
            // Contadores D1
            let d1Counts = { saltar: 0, observar: 0, avanzar: 0 };
            
            // Contadores D2
            let d2Counts = {}; 
            const nombresD2 = {
                t1: "Falta de respeto", t2: "No cobertura", t3: "Carga de trabajo", t4: "Fallo reparador",
                t5: "Falta info perito", t6: "Amenaza reclamación", t7: "Carga emocional", t8: "Pedir datos enfadado",
                t9: "Presión TMO", t10: "Fallo de sistema"
            };

            // Contadores IRE
            let ireCounts = { taqui: 0, tension: 0, sudor: 0 };

            rows.forEach(row => {
                // Extraemos los valores ignorando cómo se llamen las cabeceras en Google Sheets (basado en índices)
                const cols = Object.values(row); 
                const tipoEvento = cols[1]; // Columna B: Tipo de Evento

                if (tipoEvento === "D1_VOTO") {
                    const voto = cols[2]; // Columna C: Elección D1
                    if (d1Counts[voto] !== undefined) d1Counts[voto]++;
                } 
                else if (tipoEvento === "REPORTE_GRAL") {
                    // D2: Triggers están en la columna F (Índice 5)
                    const triggersStr = cols[5];
                    if (typeof triggersStr === 'string' && triggersStr.trim() !== "") {
                        let triggers = triggersStr.split(',');
                        triggers.forEach(t => {
                            if (t) d2Counts[t] = (d2Counts[t] || 0) + 1;
                        });
                    }

                    // IRE: Síntomas están concatenados en la columna E (Índice 4) ej: "Sí,No,Sí"
                    const ireStr = cols[4];
                    if (typeof ireStr === 'string' && ireStr.includes(',')) {
                        let parts = ireStr.split(',');
                        if (parts[0] === "Sí") ireCounts.taqui++;
                        if (parts[1] === "Sí") ireCounts.tension++;
                        if (parts[2] === "Sí") ireCounts.sudor++;
                    }
                }
            });

            updateCharts(d1Counts, d2Counts, nombresD2, ireCounts);
        }

        function updateCharts(d1, d2, labelsD2, ire) {
            // GRÁFICA 1: La Selva (Pastel)
            if (chart1) chart1.destroy();
            chart1 = new Chart(document.getElementById('chartD1'), {
                type: 'pie',
                data: {
                    labels: ['Saltar (Vía Rápida)', 'Observar (Vía Lenta)', 'Avanzar (Riesgo)'],
                    datasets: [{ 
                        data: [d1.saltar, d1.observar, d1.avanzar], 
                        backgroundColor: ['#ef4444', '#3b82f6', '#f97316'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom' } } }
            });

            // GRÁFICA 2: Top 10 Riesgos (Barras Horizontales)
            // Preparamos los datos ordenados
            const d2Data = Object.keys(labelsD2).map(key => ({ 
                label: labelsD2[key], 
                value: d2[key] || 0 
            }));
            // Ordenamos de mayor a menor
            d2Data.sort((a, b) => b.value - a.value);

            if (chart2) chart2.destroy();
            chart2 = new Chart(document.getElementById('chartD2'), {
                type: 'bar',
                options: { 
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } }
                },
                data: {
                    labels: d2Data.map(d => d.label),
                    datasets: [{ 
                        data: d2Data.map(d => d.value), 
                        backgroundColor: '#10b981',
                        borderRadius: 4
                    }]
                }
            });

            // GRÁFICA 3: IRE (Barras Verticales)
            if (chart3) chart3.destroy();
            chart3 = new Chart(document.getElementById('chartIRE'), {
                type: 'bar',
                options: {
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                },
                data: {
                    labels: ['Taquicardia / Pecho', 'Tensión Mandíbula / Hombros', 'Sudoración / Agitación'],
                    datasets: [{
                        data: [ire.taqui, ire.tension, ire.sudor],
                        backgroundColor: ['#ef4444', '#eab308', '#3b82f6'],
                        borderRadius: 6
                    }]
                }
            });
        }
    </script>
</body>
</html>
