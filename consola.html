<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONSOLA MASTER - PsycoIntera</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --panel-bg: #1e293b; --blue-corp: #1976D2;
            --text-light: #f8fafc; --text-muted: #94a3b8; --accent-green: #10b981;
            --accent-red: #ef4444; --orange-btn: #f97316; --border-color: #334155;
        }
        body { font-family: sans-serif; background: var(--bg-dark); color: var(--text-light); margin: 0; display: flex; height: 100vh; }
        nav { width: 250px; background: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; overflow-y:auto;}
        .nav-btn { background: transparent; border: none; color: var(--text-muted); padding: 12px 20px; text-align: left; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-left: 4px solid transparent; }
        .nav-btn.active { color: var(--blue-corp); border-left-color: var(--blue-corp); background: rgba(25, 118, 210, 0.1); }
        .sync-btn { margin: 20px; padding: 12px; background: var(--accent-green); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        main { flex: 1; padding: 30px; overflow-y: auto; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .text-card { background: var(--panel-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); border-left: 5px solid var(--blue-corp); }
        .card-chart { background: var(--panel-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        #login-gate { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .pin-box { background: white; padding: 40px; border-radius: 16px; text-align: center; color: #1f2937; }
        .btn-repartir { width: 100%; padding: 15px; background: var(--orange-btn); color: white; font-weight: bold; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);}
        .btn-repartir:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="pin-box">
            <h2>Consola Facilitador</h2>
            <input type="password" id="master-pin" style="font-size:2rem; width:150px; text-align:center; margin-bottom:20px; outline:none;">
            <button onclick="login()" style="display:block; width:100%; padding:12px; background:var(--blue-corp); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Desbloquear Panel</button>
        </div>
    </div>

    <nav>
        <div style="text-align:center; color:var(--blue-corp); font-weight:900; margin-bottom:20px;">PSYCOINTERA PRO</div>
        <button class="nav-btn active" onclick="switchView('graficas', this)">📊 Gráficas y Métricas</button>
        <button class="nav-btn" onclick="switchView('d3', this)">🪞 D3: Espejo</button>
        <button class="nav-btn" onclick="switchView('d5', this)">🥋 D5: Laboratorio</button>
        <button class="nav-btn" onclick="switchView('d6', this)">🛂 D6: Aduana</button>
        <button class="nav-btn" onclick="switchView('a2', this)">🛡️ A2: Muro Cristal</button>
        <button class="nav-btn" onclick="switchView('a3', this)">🌉 A3: Puentes</button>
        <button class="nav-btn" onclick="switchView('d7', this)">🤝 D7: Compromisos</button>
        <button class="nav-btn" onclick="switchView('anotaciones', this)">📝 Anotaciones</button>
        <button class="sync-btn" onclick="fetchData()">🔄 SINCRONIZAR</button>
    </nav>

    <main>
        <div id="view-graficas" class="view-section active">
            <div class="card-chart"><h3>D1: La Selva</h3><canvas id="chartD1"></canvas></div>
            <div class="card-chart"><h3>D2: Top Disparadores</h3><canvas id="chartD2"></canvas></div>
            <div class="card-chart"><h3>A1: Mapa IRE</h3><canvas id="chartIRE"></canvas></div>
            <div class="card-chart" style="max-width: 400px; margin:0 auto;"><h3>D4: Biofeedback</h3><canvas id="chartD4"></canvas></div>
        </div>

        <div id="view-d3" class="view-section"><h2>D3: Espejo</h2><div class="grid-cards" id="container-d3"></div></div>
        
        <div id="view-d5" class="view-section">
            <h2>D5: Laboratorio</h2>
            <button class="btn-repartir" onclick="repartirD5(this)">🔀 REPARTIR FRASES (Iniciar Judo Verbal)</button>
            <div class="grid-cards" id="container-d5"></div>
        </div>
        
        <div id="view-d6" class="view-section"><h2>D6: Aduana</h2><div class="grid-cards" id="container-d6"></div></div>
        <div id="view-a2" class="view-section"><h2>A2: Muro</h2><div class="grid-cards" id="container-a2"></div></div>
        <div id="view-a3" class="view-section"><h2>A3: Puentes</h2><div class="grid-cards" id="container-a3"></div></div>
        <div id="view-d7" class="view-section"><h2>D7: Compromisos</h2><div class="grid-cards" id="container-d7"></div></div>
        <div id="view-anotaciones" class="view-section"><h2>Anotaciones</h2><div class="grid-cards" id="container-anotaciones"></div></div>
    </main>

    <script>
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxlAerqfiEcwtjx7UBzprnq7PHE5Oy4zczNEDoUbaLhAwB1yZY0lSB4q_jm86FOgeZ8/exec'; // <--- PEGA LA URL
        const MASTER_PIN = '5629';
        let charts = {};

        document.getElementById('master-pin').addEventListener('keypress', function (e) { if (e.key === 'Enter') login(); });

        function login() {
            if (document.getElementById('master-pin').value === MASTER_PIN) {
                document.getElementById('login-gate').style.display = 'none';
                fetchData();
            } else { alert("PIN Incorrecto"); }
        }

        function switchView(viewId, btn) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            btn.classList.add('active');
        }

        async function fetchData() {
            const btn = document.querySelector('.sync-btn');
            btn.innerText = '⌛...';
            try {
                const res = await fetch(GOOGLE_URL);
                const data = await res.json();
                processData(data);
                btn.innerText = '✅ LISTO';
                setTimeout(() => btn.innerText = '🔄 SINCRONIZAR', 3000);
            } catch (e) { btn.innerText = '❌ ERROR'; setTimeout(() => btn.innerText = '🔄 SINCRONIZAR', 3000); }
        }

        // FUNCIÓN DEL GATILLO DE LA D5
        function repartirD5(btn) {
            btn.innerText = 'Enviando orden...';
            fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipoEvento: "D5_REPARTIR" }) })
            .then(() => { 
                btn.innerText = '✅ FRASES REPARTIDAS A LOS MOVILES'; 
                btn.style.backgroundColor = 'var(--accent-green)';
            }).catch(() => { btn.innerText = '❌ ERROR DE CONEXIÓN'; });
        }

        function processData(rows) {
            ['container-d3', 'container-d5', 'container-d6', 'container-a2', 'container-a3', 'container-d7', 'container-anotaciones'].forEach(id => document.getElementById(id).innerHTML = '');
            
            let d1 = { saltar:0, observar:0, avanzar:0 };
            let d2 = {};
            let ire = { ire1:0, ire2:0, ire3:0, ire4:0, ire5:0, ire6:0, ire7:0, ire8:0, ire9:0, ire10:0 };
            let d4 = { si:0, no:0 };

            rows.forEach(r => {
                const t = r.col1;
                if (!t) return;

                // FIX SUPER ROBUSTO PARA D1 Y D2
                if (t === "Voto_D1") {
                    let v = String(r.col2).trim().toLowerCase();
                    if (d1[v] !== undefined) d1[v]++;
                }
                else if (t === "D2_VOTO") {
                    if (r.col2) String(r.col2).split(',').forEach(v => {
                        let clean = v.trim();
                        if (clean) d2[clean] = (d2[clean] || 0) + 1;
                    });
                }
                else if (t === "A1_VOTO") {
                    if (r.col2) String(r.col2).split(',').forEach(id => {
                        let clean = id.trim();
                        if (ire[clean] !== undefined) ire[clean]++;
                    });
                }
                else if (t === "D3_VOTO") addCard('container-d3', 'Caso', r.col3, `Reencuadre: <span style="color:#f8fafc">${r.col4}</span>`);
                else if (t === "D4_VOTO") d4[String(r.col2).trim() === "Sí" ? 'si' : 'no']++;
                else if (t === "D5_RESPUESTA_FINAL") addCard('container-d5', 'Cliente: '+r.col2, `Judo Verbal: <span style="color:#f8fafc">${r.col3}</span>`);
                else if (t === "D6_VOTO") addCard('container-d6', 'Alternativas', `Calma: <span style="color:#10b981">${r.col2}</span><br>Culpa: <span style="color:#10b981">${r.col3}</span><br>Grite: <span style="color:#10b981">${r.col4}</span>`);
                else if (t === "A2_VOTO") addCard('container-a2', 'Muro', `<span style="color:var(--accent-red)">Rebota:</span> ${r.col3}<br><span style="color:var(--accent-green)">Atraviesa:</span> ${r.col4}`);
                else if (t === "A3_VOTO") addCard('container-a3', 'Puente', `1. ${r.col3}<br>2. ${r.col4}<br>3. ${r.col5}`);
                else if (t === "D7_VOTO") addCard('container-d7', 'PRP', `Señal: ${r.col2} | Escudo: ${r.col3}`, `Reset: ${r.col4}`);
                else if (t === "ANOTACIONES_VOTO") addCard('container-anotaciones', 'Nota', r.col2);
            });
            renderCharts(d1, d2, ire, d4);
        }

        function addCard(id, h, b, f = null) {
            const c = document.getElementById(id);
            if(c) c.innerHTML += `<div class="text-card"><div class="text-card-header">${h}</div><div class="text-card-body">${b}</div>${f?`<div class="text-card-footer">${f}</div>`:''}</div>`;
        }

        function renderCharts(d1, d2, ire, d4) {
            if(charts.c1) charts.c1.destroy();
            charts.c1 = new Chart(document.getElementById('chartD1'), { type:'pie', data:{ labels:['Saltar','Observar','Avanzar'], datasets:[{data:[d1.saltar, d1.observar, d1.avanzar], backgroundColor:['#ef4444','#3b82f6','#f97316']}]}, options:{plugins:{legend:{labels:{color:'white'}}}}});
            
            const labelsD2 = {t1:"Falta Respeto", t2:"No Cobertura", t3:"Carga", t4:"Reparador", t5:"Perito", t6:"Amenaza", t7:"Emocional", t8:"Datos", t9:"TMO", t10:"Sistema"};
            const d2Data = Object.keys(labelsD2).map(k => ({l:labelsD2[k], v:d2[k]||0})).sort((a,b) => b.val - a.val);
            if(charts.c2) charts.c2.destroy();
            charts.c2 = new Chart(document.getElementById('chartD2'), { type:'bar', options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{ticks:{stepSize:1}}}}, data:{ labels:d2Data.map(x=>x.l), datasets:[{data:d2Data.map(x=>x.v), backgroundColor:'#10b981'}]}});

            if(charts.c3) charts.c3.destroy();
            charts.c3 = new Chart(document.getElementById('chartIRE'), { type:'bar', options:{plugins:{legend:{display:false}}, scales:{y:{ticks:{stepSize:1}}}}, data:{ labels:['Taquicardia','Tensión','Sudor','Nudo','Temblor','Sequedad','Túnel','Rumiación','Irritabilidad','Apatía'], datasets:[{data:Object.values(ire), backgroundColor:'#1976D2'}]}});

            if(charts.c4) charts.c4.destroy();
            charts.c4 = new Chart(document.getElementById('chartD4'), { type:'doughnut', data:{ labels:['Calma','Sin cambio'], datasets:[{data:[d4.si, d4.no], backgroundColor:['#10b981','#94a3b8']}]}, options:{plugins:{legend:{labels:{color:'white'}}}}});
        }
    </script>
</body>
</html>
