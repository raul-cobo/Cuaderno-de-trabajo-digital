<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONSOLA MASTER - PsycoIntera</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a; --panel-bg: #1e293b; --blue-corp: #1976D2;
            --text-light: #f8fafc; --text-muted: #94a3b8; --accent-green: #10b981;
            --accent-red: #ef4444; --orange-btn: #f97316; --border-color: #334155;
        }
        body { font-family: sans-serif; background: var(--bg-dark); color: var(--text-light); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        nav { width: 250px; background: var(--panel-bg); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; overflow-y:auto;}
        .nav-btn { background: transparent; border: none; color: var(--text-muted); padding: 12px 20px; text-align: left; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-left: 4px solid transparent; }
        .nav-btn.active { color: var(--blue-corp); border-left-color: var(--blue-corp); background: rgba(25, 118, 210, 0.1); }
        .sync-btn { margin: 20px; padding: 12px; background: var(--accent-green); border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }
        main { flex: 1; padding: 30px; overflow-y: auto; background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 100%); }
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        h2.view-title { color: var(--blue-corp); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .text-card { background: var(--panel-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); border-left: 5px solid var(--blue-corp); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .text-card-header { font-size: 0.75rem; color: var(--blue-corp); margin-bottom: 10px; text-transform: uppercase; font-weight: 800; }
        .text-card-body { font-size: 1.1rem; line-height: 1.5; color: var(--text-light); font-style: italic; }
        .text-card-footer { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); color: var(--accent-green); font-weight: 600; font-size: 0.95rem; }
        .card-chart { background: var(--panel-bg); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        #login-gate { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .pin-box { background: white; padding: 40px; border-radius: 16px; text-align: center; color: #1f2937; }
        .btn-repartir { width: 100%; padding: 15px; background: var(--orange-btn); color: white; font-weight: bold; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);}
        .btn-repartir:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="login-gate">
        <div class="pin-box">
            <h2 style="margin:0 0 20px 0; color:var(--blue-corp)">Consola Facilitador</h2>
            <input type="password" id="master-pin" style="font-size:2rem; width:150px; text-align:center; margin-bottom:20px; outline:none; padding:10px; border:2px solid #cbd5e1; border-radius:8px;" placeholder="••••">
            <button onclick="login()" style="display:block; width:100%; padding:12px; background:var(--blue-corp); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Desbloquear Panel</button>
        </div>
    </div>

    <nav>
        <div style="text-align:center; color:var(--blue-corp); font-weight:900; margin-bottom:20px; padding: 0 10px;">PSYCOINTERA PRO</div>
        <button class="nav-btn active" onclick="switchView('graficas', this)">📊 Gráficas y Métricas</button>
        <button class="nav-btn" onclick="switchView('d3', this)">🪞 D3: Espejo</button>
        <button class="nav-btn" onclick="switchView('d5', this)">🥋 D5: Laboratorio</button>
        <button class="nav-btn" onclick="switchView('d6', this)">🛂 D6: Aduana</button>
        <button class="nav-btn" onclick="switchView('a2', this)">🛡️ A2: Muro Cristal</button>
        <button class="nav-btn" onclick="switchView('a3', this)">🌉 A3: Puentes</button>
        <button class="nav-btn" onclick="switchView('d7', this)">🤝 D7: Compromisos</button>
        <button class="nav-btn" onclick="switchView('anotaciones', this)">📝 Anotaciones</button>
        <button class="sync-btn" onclick="fetchData()">🔄 SINCRONIZAR</button>
    </nav>

    <main>
        <div id="view-graficas" class="view-section active">
            <div class="card-chart" style="max-width: 500px; margin:0 auto 20px auto;"><h3>D1: La Selva</h3><canvas id="chartD1"></canvas></div>
            <div class="card-chart"><h3>D2: Top Disparadores (Termómetro)</h3><canvas id="chartD2"></canvas></div>
            <div class="card-chart"><h3>A1: Mapa IRE</h3><canvas id="chartIRE"></canvas></div>
            <div id="container-otros-a1" style="margin: -10px 0 20px 0; color:var(--text-muted); font-size:0.9rem;"></div>
            <div class="card-chart" style="max-width: 400px; margin:0 auto;"><h3>D4: Biofeedback</h3><canvas id="chartD4"></canvas></div>
        </div>

        <div id="view-d3" class="view-section"><h2 class="view-title">D3: Espejo Profesional</h2><div class="grid-cards" id="container-d3"></div></div>
        
        <div id="view-d5" class="view-section">
            <h2 class="view-title">D5: Laboratorio</h2>
            <button class="btn-repartir" onclick="repartirD5(this)">🔀 REPARTIR FRASES (Iniciar Judo Verbal)</button>
            <div class="grid-cards" id="container-d5"></div>
        </div>
        
        <div id="view-d6" class="view-section"><h2 class="view-title">D6: Aduana</h2><div class="grid-cards" id="container-d6"></div></div>
        <div id="view-a2" class="view-section"><h2 class="view-title">A2: Muro</h2><div class="grid-cards" id="container-a2"></div></div>
        <div id="view-a3" class="view-section"><h2 class="view-title">A3: Puentes</h2><div class="grid-cards" id="container-a3"></div></div>
        <div id="view-d7" class="view-section"><h2 class="view-title">D7: Compromisos</h2><div class="grid-cards" id="container-d7"></div></div>
        <div id="view-anotaciones" class="view-section"><h2 class="view-title">Anotaciones de los Participantes</h2><div class="grid-cards" id="container-anotaciones"></div></div>
    </main>

    <script>
        const GOOGLE_URL = 'https://script.google.com/macros/s/AKfycbxlAerqfiEcwtjx7UBzprnq7PHE5Oy4zczNEDoUbaLhAwB1yZY0lSB4q_jm86FOgeZ8/exec'; // Asegúrate de que esta URL sea la última generada
        const MASTER_PIN = '5629';
        let charts = {};

        document.getElementById('master-pin').addEventListener('keypress', function (e) { if (e.key === 'Enter') login(); });

        function login() {
            if (document.getElementById('master-pin').value === MASTER_PIN) {
                document.getElementById('login-gate').style.display = 'none';
                fetchData();
            } else { alert("PIN Incorrecto"); }
        }

        function switchView(viewId, btn) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            btn.classList.add('active');
        }

        async function fetchData() {
            const btn = document.querySelector('.sync-btn');
            btn.innerText = '⌛ DESCARGANDO...';
            try {
                const res = await fetch(GOOGLE_URL);
                const data = await res.json();
                processData(data);
                btn.innerText = '✅ ACTUALIZADO';
                setTimeout(() => btn.innerText = '🔄 SINCRONIZAR', 3000);
            } catch (e) { 
                console.error(e);
                btn.innerText = '❌ ERROR'; 
                setTimeout(() => btn.innerText = '🔄 SINCRONIZAR', 3000); 
            }
        }

        function repartirD5(btn) {
            btn.innerText = 'Enviando orden...';
            fetch(GOOGLE_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipoEvento: "D5_REPARTIR" }) })
            .then(() => { 
                btn.innerText = '✅ FRASES REPARTIDAS A LOS MOVILES'; 
                btn.style.backgroundColor = 'var(--accent-green)';
            }).catch(() => { btn.innerText = '❌ ERROR DE CONEXIÓN'; });
        }

        function createCard(containerId, header, body, footer = null, isRed = false) {
            const container = document.getElementById(containerId);
            if(!container) return;
            const card = document.createElement('div');
            card.className = 'text-card';
            if(isRed) card.style.borderLeftColor = 'var(--accent-red)';
            
            let html = `<div class="text-card-header">${header}</div><div class="text-card-body">${body}</div>`;
            if(footer) html += `<div class="text-card-footer">${footer}</div>`;
            
            card.innerHTML = html;
            container.appendChild(card);
        }

        function processData(rows) {
            ['container-d3', 'container-d5', 'container-d6', 'container-a2', 'container-a3', 'container-d7', 'container-anotaciones'].forEach(id => {
                let el = document.getElementById(id);
                if(el) el.innerHTML = '';
            });
            
            let d1 = { saltar:0, observar:0, avanzar:0 };
            let d2 = {};
            let ire = { ire1:0, ire2:0, ire3:0, ire4:0, ire5:0, ire6:0, ire7:0, ire8:0, ire9:0, ire10:0 };
            let d4 = { si:0, no:0 };
            let otrosA1 = [];

            rows.forEach(r => {
                const t = r.col1;
                if (!t) return;

                if (t === "Voto_D1") {
                    if(r.col2) {
                        let v = String(r.col2).trim().toLowerCase();
                        if (d1[v] !== undefined) d1[v]++;
                    }
                }
                // Doble filtro para la D2 (Botón individual)
                else if (t === "D2_VOTO") {
                    if (r.col2) String(r.col2).split(',').forEach(v => {
                        let clean = v.trim().toLowerCase();
                        if (clean) d2[clean] = (d2[clean] || 0) + 1;
                    });
                }
                // Doble filtro para la D2 (Botón Reporte Grupal en col3)
                else if (t === "REPORTE_GRAL") {
                    if (r.col3) String(r.col3).split(',').forEach(v => {
                        let clean = v.trim().toLowerCase();
                        if (clean) d2[clean] = (d2[clean] || 0) + 1;
                    });
                }
                else if (t === "A1_VOTO") {
                    if (r.col2) String(r.col2).split(',').forEach(id => {
                        let clean = id.trim().toLowerCase();
                        if (ire[clean] !== undefined) ire[clean]++;
                    });
                    if (r.col4) otrosA1.push(String(r.col4));
                }
                else if (t === "D3_VOTO") {
                    createCard('container-d3', 'Caso Asignado', r.col3, `Reencuadre: <span style="color:var(--text-light)">${r.col4}</span>`);
                }
                else if (t === "D4_VOTO") {
                    if(r.col2) {
                        let val = String(r.col2).trim().toLowerCase();
                        if (val === "sí" || val === "si") d4.si++;
                        else if (val === "no") d4.no++;
                    }
                }
                else if (t === "D5_RESPUESTA_FINAL") {
                    createCard('container-d5', 'Cliente: '+r.col2, `Judo Verbal: <span style="color:var(--text-light)">${r.col3}</span>`, null, true);
                }
                else if (t === "D6_VOTO") {
                    createCard('container-d6', 'Alternativas', `Calma ➔ <span style="color:var(--accent-green)">${r.col2}</span><br><br>Culpa ➔ <span style="color:var(--accent-green)">${r.col3}</span><br><br>Grite ➔ <span style="color:var(--accent-green)">${r.col4}</span>`);
                }
                else if (t === "A2_VOTO") {
                    createCard('container-a2', 'Muro', `<span style="color:var(--accent-red)">Rebota:</span> ${r.col3}<br><br><span style="color:var(--accent-green)">Atraviesa:</span> ${r.col4}`);
                }
                else if (t === "A3_VOTO") {
                    createCard('container-a3', 'Puente', `1. ${r.col3}<br><br>2. ${r.col4}<br><br>3. ${r.col5}`);
                }
                else if (t === "D7_VOTO") {
                    createCard('container-d7', 'PRP', `Señal: ${r.col2} | Escudo: ${r.col3}`, `Reset: ${r.col4}`);
                }
                else if (t === "ANOTACIONES_VOTO") {
                    createCard('container-anotaciones', 'Nota', r.col2);
                }
            });

            renderCharts(d1, d2, ire, d4);
            const divOtros = document.getElementById('container-otros-a1');
            if(divOtros) {
                divOtros.innerHTML = otrosA1.length > 0 ? "<strong>Síntomas cualitativos extraídos:</strong> " + otrosA1.join(' | ') : "";
            }
        }

        function renderCharts(d1, d2, ire, d4) {
            // Chart D1
            if(charts.c1) charts.c1.destroy();
            charts.c1 = new Chart(document.getElementById('chartD1'), { 
                type:'pie', 
                data:{ labels:['Saltar (Instinto)','Observar (Córtex)','Avanzar (Peligro)'], datasets:[{data:[d1.saltar, d1.observar, d1.avanzar], backgroundColor:['#ef4444','#3b82f6','#f97316'], borderWidth:0}] }, 
                options:{plugins:{legend:{labels:{color:'#f8fafc'}}}}
            });
            
            // Chart D2
            const labelsD2 = {t1:"Falta Respeto", t2:"No Cobertura", t3:"Carga Trabajo", t4:"Fallo Reparador", t5:"Falta Info", t6:"Amenaza Recl.", t7:"Carga Emocional", t8:"Pedir Datos", t9:"Presión TMO", t10:"Fallo Sistema"};
            const d2Data = Object.keys(labelsD2).map(k => ({l:labelsD2[k], v:d2[k]||0})).sort((a,b) => b.val - a.val);
            if(charts.c2) charts.c2.destroy();
            charts.c2 = new Chart(document.getElementById('chartD2'), { 
                type:'bar', 
                options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{ticks:{stepSize:1, color:'#94a3b8'}}, y:{ticks:{color:'#94a3b8'}}}}, 
                data:{ labels:d2Data.map(x=>x.l), datasets:[{data:d2Data.map(x=>x.v), backgroundColor:'#10b981', borderRadius:4}]}
            });

            // Chart IRE
            if(charts.c3) charts.c3.destroy();
            charts.c3 = new Chart(document.getElementById('chartIRE'), { 
                type:'bar', 
                options:{plugins:{legend:{display:false}}, scales:{y:{ticks:{stepSize:1, color:'#94a3b8'}}, x:{ticks:{color:'#94a3b8'}}}}, 
                data:{ labels:['Taqui','Tensión','Sudor','Nudo','Temblor','Sequedad','Túnel','Rumiación','Irritabilidad','Apatía'], datasets:[{data:Object.values(ire), backgroundColor:'#1976D2', borderRadius:4}]}
            });

            // Chart D4
            if(charts.c4) charts.c4.destroy();
            charts.c4 = new Chart(document.getElementById('chartD4'), { 
                type:'doughnut', 
                data:{ labels:['Sienten Calma','Sin cambio'], datasets:[{data:[d4.si, d4.no], backgroundColor:['#10b981','#94a3b8'], borderWidth:0}]}, 
                options:{plugins:{legend:{labels:{color:'#f8fafc'}}}}
            });
        }
    </script>
</body>
</html>
